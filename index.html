<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Clue 2 of 3 · Language Services</title>
<style>
  :root {
    --bg: #f6f8fb;
    --card: #ffffff;
    --border: #d8dfee;
    --text: #1f223a;
    --muted: #5a6382;
    --accent: #5a4db8;
    --accentBg: #eeeafb;
    --coral: #d4489f;
    --lavender: #9b7bc7;
    --mint: #5fb8a8;
    --gold: #d4a850;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; overflow: hidden; }
  .bg-orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.35; pointer-events: none; }
  .orb1 { width: 420px; height: 420px; background: var(--lavender); top: -100px; right: -100px; }
  .orb2 { width: 360px; height: 360px; background: var(--mint); bottom: -80px; left: -80px; opacity: 0.3; }
  .orb3 { width: 260px; height: 260px; background: var(--coral); top: 50%; left: 20%; opacity: 0.18; }
  .card { position: relative; z-index: 2; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 56px 52px; max-width: 640px; width: 100%; box-shadow: 0 30px 80px rgba(90, 77, 184, 0.12), 0 8px 24px rgba(90, 77, 184, 0.06); text-align: center; animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--accentBg); color: var(--accent); border: 1px solid #ddd3f4; border-radius: 999px; padding: 8px 16px; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }
  .eyebrow { font-size: 13px; font-weight: 800; color: var(--mint); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
  h1 { font-size: 42px; font-weight: 900; letter-spacing: -1.2px; line-height: 1.05; margin: 0 0 14px; }
  .subtitle { font-size: 15px; color: var(--muted); margin: 0 0 36px; line-height: 1.6; }
  .clue-frame { position: relative; background: linear-gradient(135deg, #eeeafb 0%, #e3f4f0 100%); border: 1px dashed #c8bee8; border-radius: 20px; padding: 36px 28px; margin: 0 0 36px; }
  .clue-frame::before, .clue-frame::after { content: "\201C"; position: absolute; font-family: Georgia, serif; font-size: 90px; color: rgba(90, 77, 184, 0.18); line-height: 1; }
  .clue-frame::before { top: -8px; left: 18px; }
  .clue-frame::after { content: "\201D"; bottom: -46px; right: 18px; }
  .clue-text { font-family: Georgia, "Times New Roman", serif; font-size: 22px; font-style: italic; line-height: 1.5; color: var(--text); margin: 0; }
  .clue-text em { font-style: italic; font-weight: 700; color: var(--accent); }
  .progress { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0 0 28px; }
  .pip { width: 34px; height: 6px; border-radius: 3px; background: #dfe3ef; }
  .pip.active { background: var(--accent); box-shadow: 0 0 12px rgba(90, 77, 184, 0.4); }
  .footer { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding-top: 24px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .signature { text-align: left; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .signature strong { color: var(--text); display: block; font-size: 13px; font-weight: 800; }
  .next { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; text-align: right; }
  @media (max-width: 560px) { .card { padding: 40px 28px; border-radius: 22px; } h1 { font-size: 32px; } .clue-text { font-size: 18px; } }
</style>
</head>
<body>
  <div class="page">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>
    <div class="card">
      <div class="badge"><span class="dot"></span> Clue 2 of 3</div>
      <div class="eyebrow">Thursday, April 29</div>
      <h1>Day two. Keep thinking.</h1>
      <p class="subtitle">One more to go. Put the clues side by side and a word will start to take shape.</p>

      <div class="clue-frame">
        <p class="clue-text">
          It <em>spans distance</em>. It overcomes <em>separation</em>.<br/>
          Without it, progress stops.
        </p>
      </div>

      <div class="progress">
        <div class="pip active"></div>
        <div class="pip active"></div>
        <div class="pip"></div>
      </div>

      <div class="footer">
        <div class="signature">
          <strong>The Unity Committee</strong>
          Language Services · Advocate Health
        </div>
        <div class="next">Clue 3 · Friday, April 30 &rarr;</div>
      </div>
    </div>
  </div>
</body>
</html>
